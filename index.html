<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPL Exam Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; }
h2 { text-align: center; }
button { padding: 10px; margin: 8px 0; width: 100%; font-size: 16px; }
.hidden { display: none; }
.option { margin: 8px 0; }
.question { font-size: 18px; margin-bottom: 20px; }
.topbar { margin-bottom: 20px; }
.review-box { margin-top: 20px; }
</style>
</head>
<body>

<h2>PPL Exam Trainer</h2>

<div class="topbar">
  <button onclick="goHome()">🏠 Main Menu</button>
</div>

<div id="homeScreen">
  <h3>Select Subject</h3>
  <button onclick="startExam('meteorology')">Meteorology</button>
  <button onclick="startExam('airlaw')">Air Law</button>
</div>

<div id="quizScreen" class="hidden">
  <div id="quiz"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<div id="resultScreen" class="hidden"></div>

<script>

const questionBank = {

meteorology: [
{
question: "Which cloud type is associated with thunderstorms?",
options: ["Stratus", "Cumulonimbus", "Cirrus", "Altostratus"],
correct: 1
},
{
question: "What happens to air pressure as altitude increases?",
options: ["It increases", "It decreases", "It remains constant", "It fluctuates"],
correct: 1
},
{
question: "Fog is formed when:",
options: ["Warm air rises rapidly", "Air reaches its dew point near the surface", "Pressure increases rapidly", "Cold air sinks quickly"],
correct: 1
}
],

airlaw: [
{
question: "Who is responsible for the safe conduct of the flight?",
options: ["Air Traffic Control", "Aircraft owner", "Pilot in Command", "Handling agent"],
correct: 2
},
{
question: "Minimum VFR visibility below 3000 ft in controlled airspace is:",
options: ["5 km", "8 km", "3 km", "1.5 km"],
correct: 0
}
]

};

let selectedQuestions = [];
let current = 0;
let score = 0;
let userAnswers = [];
let currentSubject = "";

function startExam(subject) {
  currentSubject = subject;
  selectedQuestions = shuffle([...questionBank[subject]]);
  current = 0;
  score = 0;
  userAnswers = [];
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  loadQuestion();
}

function loadQuestion() {
  const q = selectedQuestions[current];
  document.getElementById("quiz").innerHTML = `
    <div class="question">
      Question ${current+1} of ${selectedQuestions.length}<br><br>
      ${q.question}
    </div>
    ${q.options.map((opt,i)=>`
      <div class="option">
        <input type="radio" name="option" value="${i}"> ${opt}
      </div>`).join("")}
  `;
}

function nextQuestion() {
  const selected = document.querySelector('input[name="option"]:checked');
  if (!selected) return alert("Please select an answer.");

  const answerIndex = parseInt(selected.value);
  userAnswers.push(answerIndex);

  if (answerIndex === selectedQuestions[current].correct) {
    score++;
  }

  current++;

  if (current < selectedQuestions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  const percent = Math.round((score/selectedQuestions.length)*100);

  let review = `<h3>Final Score: ${score}/${selectedQuestions.length} (${percent}%)</h3>`;
  review += `<div class="review-box">`;

  selectedQuestions.forEach((q,i)=>{
    if(userAnswers[i] !== q.correct){
      review += `
      <p>
      <strong>Question:</strong> ${q.question}<br>
      <strong>Your answer:</strong> ${q.options[userAnswers[i]]}<br>
      <strong>Correct answer:</strong> ${q.options[q.correct]}
      </p>`;
    }
  });

  if(score === selectedQuestions.length){
    review += "<p><strong>Perfect score. Well done.</strong></p>";
  }

  review += "</div>";

  document.getElementById("resultScreen").innerHTML = review;
  document.getElementById("resultScreen").classList.remove("hidden");
}

function goHome() {
  document.getElementById("homeScreen").classList.remove("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
