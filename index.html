<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPL Exam Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>PPL Exam Trainer</h2>

<div class="topbar">
  <button onclick="goHome()">🏠 Main Menu</button>
</div>

<div id="homeScreen">
  <h3>Select Subject</h3>
  <button onclick="startExam('meteorology')">Meteorology</button>
  <button onclick="startExam('airlaw')">Air Law</button>
</div>

<div id="quizScreen" class="hidden">
  <div id="quiz"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<div id="resultScreen" class="hidden"></div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
