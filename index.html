<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PPL Exam Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; max-width: 650px; margin: auto; padding: 20px; }
    h2 { text-align: center; }
    .question { font-size: 18px; margin-bottom: 20px; }
    .option { margin: 10px 0; }
    button { padding: 12px; margin-top: 20px; width: 100%; font-size: 16px; }
    .hidden { display: none; }
    .result-box { margin-top: 20px; }
  </style>
</head>
<body>

<h2>PPL Meteorology Examination</h2>

<div id="quiz"></div>
<button id="nextBtn" onclick="nextQuestion()">Next</button>

<div id="result" class="hidden"></div>

<script>
const questions = [
{
question: "Which cloud type is most commonly associated with thunderstorms?",
options: ["Stratus", "Cumulonimbus", "Cirrus", "Altostratus"],
correct: 1
},
{
question: "What happens to air pressure as altitude increases?",
options: ["It increases", "It decreases", "It remains constant", "It fluctuates randomly"],
correct: 1
},
{
question: "A warm front is typically associated with:",
options: ["Short intense showers", "Prolonged steady precipitation", "Clear skies", "Strong gusty winds"],
correct: 1
}
];

let current = 0;
let score = 0;
let userAnswers = [];

function loadQuestion() {
  const q = questions[current];
  document.getElementById("quiz").innerHTML = `
    <div class="question">
      Question ${current+1} of ${questions.length}<br><br>
      ${q.question}
    </div>
    ${q.options.map((opt,i)=>`
      <div class="option">
        <input type="radio" name="option" value="${i}"> ${opt}
      </div>`).join("")}
  `;
}

function nextQuestion() {
  const selected = document.querySelector('input[name="option"]:checked');
  if (!selected) return alert("Please select an answer.");

  userAnswers.push(parseInt(selected.value));
  if (parseInt(selected.value) === questions[current].correct) score++;

  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  const percent = Math.round((score/questions.length)*100);

  let review = "<div class='result-box'>";
  review += `<h3>Final Score: ${score}/${questions.length} (${percent}%)</h3>`;

  questions.forEach((q,i)=>{
    if(userAnswers[i] !== q.correct){
      review += `
      <p>
      <strong>Incorrect:</strong> ${q.question}<br>
      Correct answer: ${q.options[q.correct]}
      </p>`;
    }
  });

  review += "</div>";

  document.getElementById("result").innerHTML = review;
  document.getElementById("result").classList.remove("hidden");
}

loadQuestion();
</script>

</body>
</html>
